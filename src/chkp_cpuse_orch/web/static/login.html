<!DOCTYPE html>
<!--
  chkp-cpuse-orch — login page.

  Deliberately a SEPARATE page from index.html: it shares no tab/live state with
  the main UI (see .claude/memory/patching-web-design.md). Plain hand-editable
  HTML/CSS/JS, no build step. Reuses css/app.css; logic lives in js/login.js.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — chkp-cpuse-orch</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<main>
  <section id="login-card">
    <h2>Check Point Patch Management</h2>
    <!-- <p class="hint">Sign in with your directory account to continue.</p> -->

    <form id="login-form">
      <label class="login-field">
        Username
        <input id="login-username" type="text" autocomplete="username" autofocus required>
      </label>
      <label class="login-field">
        Password
        <input id="login-password" type="password" autocomplete="current-password" required>
      </label>
      <button id="login-submit" type="submit">Sign in</button>
      <p id="login-error" class="login-error hidden" role="alert"></p>
    </form>
  </section>

  <footer id="login-footer">
    <a id="footer-repo" href="https://github.com/jburanen/chkp-cpuse-orch" target="_blank" rel="noopener">
      <!-- GitHub mark, inline SVG so the page stays self-contained -->
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
          1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
          0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
          1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0
          3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0
          .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
    <span id="login-version" class="muted"></span>
  </footer>
</main>

<script src="/js/login.js"></script>
</body>
</html>
