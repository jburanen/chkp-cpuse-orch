# chkp-cpuse-orch — test/dev deployment.
# Brought up on the test host by scripts/deploy.sh (git pull + up --build).
services:
  web:
    build: .
    image: chkp-cpuse-orch:dev
    container_name: chkp-cpuse-orch
    # Run as the host deploy account (devuser, uid/gid 1001) so bind-mounted
    # files stay owned by a non-root user that can manage them without sudo.
    user: "1001:1001"
    ports:
      - "8080:8080"
    env_file:
      # Runtime secrets/config, git-ignored, next to this compose file. Holds the
      # credential-store master key (CHKP_CPUSE_MASTER_KEY) and — when the web UI's
      # LDAP authentication is enabled — the CHKP_CPUSE_LDAP_* settings (see
      # .env.example). NEVER commit .env. required:false so the stack still builds
      # on a host that hasn't created one yet (auth stays off, storage disabled).
      - path: .env
        required: false
    environment:
      # Config/inventory are read from the mounted data dir at runtime.
      CHKP_CPUSE_CONFIG: /data/config.yaml
      # Fallback for supplying the master key via the shell env instead of .env;
      # a value in .env (loaded above) is used when this is empty.
      CHKP_CPUSE_MASTER_KEY: ${CHKP_CPUSE_MASTER_KEY:-}
    volumes:
      - ./data:/data:rw
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
