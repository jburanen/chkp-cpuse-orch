# Example inventory — SAFE TO COMMIT (placeholder values only).
#
# Copy to `inventory.yaml` (git-ignored) and fill with real values. Never commit a
# real inventory: it names production management servers and gateways.
# See .claude/memory/security-hygiene.md.
#
# Credentials are NOT stored here — add per-host SSH credentials in the web UI;
# they are encrypted at rest in the credential store.

sites:
  - name: example-dc
    hosts:
      - name: mgmt-01
        address: 192.0.2.10          # RFC 5737 documentation address
        role: management
        ssh_user: admin

      - name: fw-standalone-01
        address: 192.0.2.20
        role: gateway
        ssh_user: admin

      - name: fw-cluster-a-member-1
        address: 192.0.2.31
        role: cluster_member
        ssh_user: admin

      - name: fw-cluster-a-member-2
        address: 192.0.2.32
        role: cluster_member
        ssh_user: admin

    clusters:
      - name: cluster-a
        # Listed standby-first as the intended patch order; live roles are
        # re-confirmed at runtime before any member is touched.
        members:
          - fw-cluster-a-member-2
          - fw-cluster-a-member-1
