# Example config — SAFE TO COMMIT (non-sensitive defaults only).
# Copy to `config.yaml` (git-ignored) and adjust. Secrets never live here.

defaults:
  dry_run: true                 # mutating ops preview by default
  max_concurrent_gateways: 2    # blast-radius cap
  reboot_after_install: true
  stop_on_first_failure: true
  snapshot_before_install: true

paths:
  reports_dir: reports
  logs_dir: logs
  state_dir: state
  db_path: state/orch.db        # jobs, credential ciphertext, package metadata
  packages_dir: packages        # uploaded package files
  inventory_path: inventory.yaml
  # In the Docker deployment everything lives on the mounted volume instead:
  #   db_path: /data/state/orch.db
  #   packages_dir: /data/packages
  #   inventory_path: /data/inventory.yaml

# Independent management environments: each has its own inventory of management
# servers (gateways are discovered per-environment via CDT) and its own
# credential namespace. Packages and the database are shared. Omit this block
# entirely for a single environment backed by paths.inventory_path.
# environments:
#   - name: corp
#     inventory: /data/inventories/corp.yaml
#   - name: dmz
#     inventory: /data/inventories/dmz.yaml

# Name of the approved maintenance window to enforce (looked up at runtime).
maintenance_window: null
